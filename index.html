<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Legend Chat Pro - Horror Mode</title>

<meta name="theme-color" content="#0a0000">

<style>

/* ░░ GLOBAL RESET */
html, body{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    font-family:Arial;
    color:#d0c8c0;
    background:#0a0000;
}

/* ░░ BACKGROUND */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:url("wolf.png");
    background-size:cover;
    background-position:center;
    z-index:-3;
    filter:brightness(0.35) contrast(1.3) saturate(0.4);
}

/* ░░ DEEP VIGNETTE OVERLAY */
body::after{
    content:"";
    position:fixed;
    inset:0;
    z-index:-2;
    background:radial-gradient(ellipse at center,
        transparent 30%,
        rgba(0,0,0,0.65) 70%,
        rgba(0,0,0,0.92) 100%);
    pointer-events:none;
}

/* ░░ FOG LAYER */
#fogLayer{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    overflow:hidden;
}

#fogLayer span{
    position:absolute;
    bottom:-10%;
    border-radius:50%;
    background:rgba(180,160,150,0.055);
    filter:blur(48px);
    animation:fogDrift linear infinite;
}

@keyframes fogDrift{
    0%  { transform:translateX(0)   translateY(0);   opacity:0;   }
    15% { opacity:1; }
    85% { opacity:0.7; }
    100%{ transform:translateX(var(--fx)) translateY(-115vh); opacity:0; }
}

/* ░░ ASH CANVAS */
#ashCanvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:1;
    pointer-events:none;
    opacity:0.85;
}

/* ░░ SLOW SHADOW SWEEP */
#shadowLayer{
    position:fixed;
    inset:0;
    z-index:2;
    pointer-events:none;
    background:linear-gradient(
        120deg,
        rgba(0,0,0,0.55) 0%,
        transparent 50%,
        rgba(0,0,0,0.55) 100%
    );
    background-size:300% 300%;
    animation:shadowSweep 18s ease-in-out infinite alternate;
}

@keyframes shadowSweep{
    0%  { background-position:0% 50%; }
    100%{ background-position:100% 50%; }
}

/* ░░ BLOOD-RED AMBIENT GLOW */
#ambientGlow{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    background:radial-gradient(ellipse at bottom center,
        rgba(120,0,0,0.18),
        rgba(60,0,0,0.07),
        transparent 65%);
    animation:glowPulse 6s ease-in-out infinite alternate;
}

@keyframes glowPulse{
    0%  { opacity:0.6; }
    100%{ opacity:1; }
}

/* ░░ HEADER */
header{
    position:relative;
    z-index:10;
    text-align:center;
    padding:12px;
    font-weight:bold;
    color:#c8a0a0;
    background:rgba(8,0,0,0.82);
    border-bottom:1px solid rgba(140,0,0,0.55);
    backdrop-filter:blur(8px);
    letter-spacing:1px;
    text-shadow:0 0 12px rgba(180,0,0,0.7);
}

/* ░░ ROOM SCREEN */
#roomScreen{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.93);
    z-index:999;
}

#roomScreen h2{
    color:#cc2222;
    text-shadow:0 0 18px rgba(200,0,0,0.8);
    letter-spacing:2px;
    margin-bottom:6px;
}

/* ░░ ROOM INPUTS */
#roomScreen input{
    padding:12px;
    border-radius:10px;
    border:1px solid rgba(140,0,0,0.5);
    margin-top:10px;
    background:#1a0505;
    color:#d8c0c0;
    text-align:center;
    outline:none;
    transition:border-color .3s;
}

#roomScreen input:focus{
    border-color:rgba(200,0,0,0.8);
    box-shadow:0 0 10px rgba(160,0,0,0.4);
}

/* ░░ ROOM BUTTONS */
#roomScreen button{
    margin-top:10px;
    padding:12px 22px;
    border:1px solid rgba(140,0,0,0.6);
    border-radius:10px;
    background:linear-gradient(135deg,#3a0000,#1a0000);
    color:#cc4444;
    font-weight:bold;
    cursor:pointer;
    letter-spacing:1px;
    text-shadow:0 0 8px rgba(200,0,0,0.6);
    transition:background .3s, box-shadow .3s;
}

#roomScreen button:hover{
    background:linear-gradient(135deg,#5a0000,#2a0000);
    box-shadow:0 0 16px rgba(180,0,0,0.5);
}

/* ░░ CHAT */
#chat{
    position:relative;
    z-index:10;
    height:calc(100vh - 140px);
    overflow-y:auto;
    padding:12px;
    scrollbar-width:thin;
    scrollbar-color:rgba(120,0,0,0.5) transparent;
}

/* ░░ MESSAGE BUBBLE */
.msg{
    background:linear-gradient(145deg,rgba(18,5,5,0.88),rgba(26,8,8,0.82),rgba(10,0,0,0.9));
    padding:12px;
    margin-bottom:10px;
    border-radius:14px;
    border:1px solid rgba(120,0,0,0.3);
    word-break:break-word;
    backdrop-filter:blur(4px);
    box-shadow:0 2px 12px rgba(0,0,0,0.6);
    transition:border-color .3s;
}

.msg:hover{
    border-color:rgba(160,0,0,0.5);
}

.msg b{
    color:#cc4040;
    text-shadow:0 0 6px rgba(160,0,0,0.5);
}

/* ░░ REACTIONS */
.reactions{
    margin-top:8px;
    display:flex;
    gap:6px;
    flex-wrap:wrap;
}

.reactions button{
    font-size:14px;
    padding:4px 8px;
    border-radius:8px;
    border:1px solid rgba(120,0,0,0.3);
    cursor:pointer;
    background:rgba(80,0,0,0.25);
    color:#d0b0b0;
    transition:background .2s, box-shadow .2s;
}

.reactions button:hover{
    background:rgba(120,0,0,0.4);
    box-shadow:0 0 8px rgba(160,0,0,0.4);
}

/* ░░ REACTION COUNT */
.reaction-count{
    font-size:12px;
    margin-left:4px;
    color:#a07070;
}

/* ░░ INPUT BAR */
.bottom{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    display:flex;
    gap:8px;
    padding:10px;
    background:rgba(8,0,0,0.88);
    z-index:10;
    backdrop-filter:blur(10px);
    border-top:1px solid rgba(100,0,0,0.4);
}

.bottom input{
    border:1px solid rgba(100,0,0,0.4);
    padding:12px;
    border-radius:10px;
    outline:none;
    background:#150202;
    color:#d0c0c0;
    transition:border-color .3s;
}

.bottom input:focus{
    border-color:rgba(180,0,0,0.7);
    box-shadow:0 0 8px rgba(140,0,0,0.35);
}

#name{ width:90px; }
#message{ flex:1; }

/* ░░ SEND / ACTION BUTTONS */
button{
    padding:12px 14px;
    border:1px solid rgba(120,0,0,0.5);
    border-radius:10px;
    background:linear-gradient(135deg,#3a0000,#1a0000);
    color:#cc4444;
    font-weight:bold;
    cursor:pointer;
    text-shadow:0 0 6px rgba(180,0,0,0.5);
    transition:background .3s, box-shadow .3s;
}

button:hover{
    background:linear-gradient(135deg,#560000,#2a0000);
    box-shadow:0 0 14px rgba(160,0,0,0.45);
}

/* ░░ EMOJI BURST */
@keyframes emojiPop{
    0%  { transform:translateY(0) scale(0.6); opacity:1; }
    100%{ transform:translateY(-44px) scale(1.4); opacity:0; }
}

.emoji-float{
    position:absolute;
    font-size:22px;
    animation:emojiPop 800ms ease-out forwards;
    pointer-events:none;
    z-index:99999;
}

/* ░░ EMOJI PICKER */
#emojiPicker{
    position:fixed;
    bottom:70px;
    left:10px;
    right:10px;
    display:none;
    flex-wrap:wrap;
    gap:6px;
    padding:10px;
    background:rgba(10,0,0,0.97);
    border:1px solid rgba(120,0,0,0.45);
    border-radius:12px;
    max-height:180px;
    overflow-y:auto;
    z-index:9999;
    box-shadow:0 0 24px rgba(100,0,0,0.4);
}

#emojiPicker span{ font-size:28px; cursor:pointer; }
#emojiBtn{ width:52px; font-size:22px; }

</style>

</head>

<body>

<canvas id="ashCanvas"></canvas>
<div id="fogLayer"></div>
<div id="ambientGlow"></div>
<div id="shadowLayer"></div>

<div id="roomScreen">
    <h2>💀 Enter Room Code</h2>
    <input id="roomInput" placeholder="ROOM123">
    <input id="nameInput" placeholder="Your Name">
    <button onclick="joinRoom()">Join Room</button>
    <button onclick="joinLobby()">Enter Lobby</button>
</div>

<header id="roomTitle">💀 Legend Chat Pro 💀 | 👥 Online: 0</header>

<div id="chat"></div>

<div class="bottom">
    <input id="name" placeholder="Name">
    <input id="message" placeholder="Message">
    <button id="emojiBtn" type="button">😊</button>
    <button onclick="sendMessage()">Send</button>
</div>

<div id="emojiPicker"></div>

<script>

/* ░░ FOG PARTICLES */
(function spawnFog(){
    const layer = document.getElementById("fogLayer");
    const count = 9;
    for(let i = 0; i < count; i++){
        const s = document.createElement("span");
        const size = 280 + Math.random() * 400;
        const delay = Math.random() * 22;
        const dur   = 28 + Math.random() * 30;
        const xDrift = (Math.random() - 0.5) * 40 + "vw";
        s.style.cssText = `
            width:${size}px; height:${size}px;
            left:${Math.random() * 110 - 5}%;
            --fx:${xDrift};
            animation-duration:${dur}s;
            animation-delay:-${delay}s;
        `;
        layer.appendChild(s);
    }
})();

/* ░░ ASH / EMBER PARTICLES */
const ashCanvas = document.getElementById("ashCanvas");
const actx = ashCanvas.getContext("2d");

function resizeAsh(){
    ashCanvas.width  = window.innerWidth;
    ashCanvas.height = window.innerHeight;
}
resizeAsh();
window.addEventListener("resize", resizeAsh);

const ASH_COUNT = 90;
const ashes = Array.from({length: ASH_COUNT}, () => ({
    x:     Math.random() * window.innerWidth,
    y:     Math.random() * window.innerHeight,
    r:     Math.random() * 1.8 + 0.4,
    speed: Math.random() * 0.5 + 0.15,
    drift: (Math.random() - 0.5) * 0.4,
    alpha: Math.random() * 0.55 + 0.15,
    glow:  Math.random() < 0.18    /* ember glow */
}));

function drawAsh(){
    actx.clearRect(0, 0, ashCanvas.width, ashCanvas.height);
    for(const a of ashes){
        actx.beginPath();
        actx.arc(a.x, a.y, a.r, 0, Math.PI * 2);
        if(a.glow){
            actx.fillStyle = `rgba(220,60,10,${a.alpha})`;
            actx.shadowColor = "rgba(220,60,10,0.9)";
            actx.shadowBlur  = 6;
        } else {
            actx.fillStyle = `rgba(160,140,130,${a.alpha})`;
            actx.shadowBlur = 0;
        }
        actx.fill();

        a.y     -= a.speed;
        a.x     += a.drift + Math.sin(a.y * 0.02) * 0.3;
        a.alpha += (Math.random() - 0.5) * 0.015;
        a.alpha  = Math.max(0.05, Math.min(0.75, a.alpha));

        if(a.y < -6){
            a.y = ashCanvas.height + 6;
            a.x = Math.random() * ashCanvas.width;
        }
    }
    requestAnimationFrame(drawAsh);
}
drawAsh();

/* ░░ EMOJI BURST */
function spawnEmoji(x, y, emoji){
    const el = document.createElement("div");
    el.className = "emoji-float";
    el.textContent = emoji;
    el.style.left = x + "px";
    el.style.top  = y + "px";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 800);
}

/* ░░ EMOJI PICKER */
const picker     = document.getElementById("emojiPicker");
const emojiBtn   = document.getElementById("emojiBtn");
const messageBox = document.getElementById("message");
if(picker && emojiBtn && messageBox){
    const emojis = ["😀","😁","😂","🤣","😊","😍","😘","🥰","😎","🤩","🥳","😭","😡","🤯","😱","👍","👏","🙌","🙏","❤️","🔥","💀","⚡","✨","🎉","🎵","🚀","🐺"];
    emojis.forEach(e => {
        let s = document.createElement("span");
        s.textContent = e;
        s.onclick = () => { messageBox.value += e; messageBox.focus(); };
        picker.appendChild(s);
    });
    emojiBtn.onclick = (ev) => {
        ev.stopPropagation();
        picker.style.display = picker.style.display === "flex" ? "none" : "flex";
    };
    document.addEventListener("click", e => {
        if(!picker.contains(e.target) && e.target !== emojiBtn)
            picker.style.display = "none";
    });
}

</script>

<script type="module">

/* ░░ FIREBASE */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getDatabase, ref, push, onChildAdded,
  remove, set, onDisconnect, onValue,
  off
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAOnAtWJ...",
  authDomain: "legend-chat-246fd.firebaseapp.com",
  databaseURL: "https://legend-chat-246fd-default-rtdb.firebaseio.com",
  projectId: "legend-chat-246fd",
  storageBucket: "legend-chat-246fd.firebasestorage.app",
  messagingSenderId: "365662264136",
  appId: "1:365662264136:web:1c7cfb6db3f09a6fa1f17d"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

let chatRef            = null;
let presenceRef        = null;
let presenceListenerRef= null;
let currentRoom        = null;

let userId = crypto.randomUUID();

/* ░░ JOIN */
window.joinRoom = function(){
    const room = document.getElementById("roomInput").value.trim().toUpperCase();
    const name = document.getElementById("nameInput").value.trim() || "Ghost";
    if(!room) return;
    enterRoom(room, name);
};

window.joinLobby = function(){
    const name = document.getElementById("nameInput").value.trim() || "Ghost";
    enterRoom("LOBBY", name);
};

function enterRoom(room, name){
    if(chatRef) off(chatRef);
    if(presenceListenerRef) off(presenceListenerRef);

    currentRoom = room;

    document.getElementById("roomScreen").style.display = "none";
    document.getElementById("chat").innerHTML = "";
    document.getElementById("name").value = name;
    document.getElementById("roomTitle").innerText =
        `💀 Room: ${room} | 👥 Online: 0`;

    chatRef = ref(db, "rooms/" + room + "/messages");

    setupPresence(room, name);
    listenMessages();
}

/* ░░ PRESENCE */
function setupPresence(room, name){
    presenceRef = ref(db, `rooms/${room}/presence/${userId}`);
    set(presenceRef, { name, online: true });
    onDisconnect(presenceRef).remove();

    presenceListenerRef = ref(db, `rooms/${room}/presence`);
    onValue(presenceListenerRef, (snap) => {
        const data  = snap.val() || {};
        const count = Object.keys(data).length;
        document.getElementById("roomTitle").innerText =
            `💀 Room: ${room} | 👥 Online: ${count}`;
    });
}

/* ░░ MESSAGES */
function listenMessages(){
    onChildAdded(chatRef, (snap) => {
        const d     = snap.val();
        const msgId = snap.key;

        const div = document.createElement("div");
        div.className = "msg";
        div.innerHTML = `<b>${escapeHtml(d.name)}</b><br>${escapeHtml(d.message)}`;

        const box = document.createElement("div");
        box.className = "reactions";

        ["😄","🔥","💀","❤️","⚡"].forEach(emo => {
            const btn   = document.createElement("button");
            const count = document.createElement("span");
            count.className   = "reaction-count";
            count.textContent = "0";
            btn.textContent   = emo + " ";

            btn.onclick = (e) => {
                const userReactRef = ref(
                    db,
                    `rooms/${currentRoom}/messages/${msgId}/reactions/${emo}/${userId}`
                );
                set(userReactRef, true);
                const rect = e.target.getBoundingClientRect();
                spawnEmoji(rect.left + rect.width / 2, rect.top, emo);
            };

            const liveRef = ref(
                db,
                `rooms/${currentRoom}/messages/${msgId}/reactions/${emo}`
            );
            onValue(liveRef, (s) => {
                const data = s.val() || {};
                count.textContent = Object.keys(data).length;
            });

            btn.appendChild(count);
            box.appendChild(btn);
        });

        div.appendChild(box);
        document.getElementById("chat").appendChild(div);

        const deleteTime = d.expiresAt || (d.time + 10 * 60 * 1000);
        const timeLeft   = deleteTime - Date.now();

        setTimeout(() => {
            const msgRef = ref(db, `rooms/${currentRoom}/messages/${msgId}`);
            remove(msgRef);
        }, Math.max(timeLeft, 0));

        document.getElementById("chat").scrollTop =
            document.getElementById("chat").scrollHeight;
    });
}

/* ░░ ESCAPE */
function escapeHtml(text){
    return (text || "").replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[m]));
}

/* ░░ SEND */
window.sendMessage = function(){
    if(!chatRef) return;
    const name    = document.getElementById("name").value || "Ghost";
    const message = document.getElementById("message").value;
    if(!message.trim()) return;
    push(chatRef, {
        name,
        message,
        time:      Date.now(),
        expiresAt: Date.now() + 10 * 60 * 1000
    });
    document.getElementById("message").value = "";
};

</script>

</body>
</html>
